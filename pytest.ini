[pytest]
# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings

# F9-12: global timeout prevents indefinite hangs (requires pytest-timeout plugin)
# If pytest-timeout is not installed this setting is silently ignored.
timeout = 30

# Markers for test categorization
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    unit: marks tests as unit tests
    portability: marks tests related to portability
    known_fail: marks tests as documented known failures pending fix
    flaky: marks tests that are non-deterministic or environment-dependent

# Coverage options (when pytest-cov is installed)
# addopts = --cov=Programma_CS2_RENAN --cov-report=html --cov-report=term

# Ignore paths
norecursedirs =
    .git
    .github
    dist
    build
    *.egg-info
    __pycache__
    .venv
    venv
    D:*
    external_libs
    latest
    reports
    docs
