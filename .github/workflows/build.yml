# P6-03: Four-Stage CI/CD Pipeline — Macena CS2 Analyzer
# Stages: Lint → Unit Test → Integration → Security (parallel with 2-3)
#
# This replaces the original three-job build.yml with a comprehensive
# quality gate that makes it impossible to merge broken code.
name: Macena CI Pipeline

on:
  push:
    branches: [main, develop, 'feature/**', 'fix/**']
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: '3.10'

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # STAGE 1: LINT (Fast — ~1 minute)
  # Catches formatting, import, and code quality issues early.
  # ═══════════════════════════════════════════════════════════════════════════
  lint:
    name: Lint & Format Check
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install lint tools
        run: |
          python -m pip install --upgrade pip
          pip install pre-commit black isort

      - name: Run pre-commit hooks (format + quality)
        run: pre-commit run --all-files --show-diff-on-failure

  # ═══════════════════════════════════════════════════════════════════════════
  # STAGE 2: UNIT TESTS + COVERAGE (Medium — ~3 minutes)
  # Catches logic errors and tracks test coverage.
  # ═══════════════════════════════════════════════════════════════════════════
  unit-test:
    name: Unit Tests + Coverage
    needs: lint
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt
          pip install pytest pytest-cov

      - name: Run pytest with coverage
        run: >
          python -m pytest Programma_CS2_RENAN/tests/ tests/
          -v --tb=short
          --cov=Programma_CS2_RENAN
          --cov-report=xml:coverage.xml
          --cov-report=term-missing
          --cov-fail-under=30
          -x
        env:
          VIRTUAL_ENV: "ci"

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 30

  # ═══════════════════════════════════════════════════════════════════════════
  # STAGE 3: INTEGRATION (Slow — ~5 minutes)
  # Runs headless validator, cross-module consistency, portability checks.
  # ═══════════════════════════════════════════════════════════════════════════
  integration:
    name: Headless Validation + Cross-Module
    needs: unit-test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt

      - name: Run headless validator (23-phase gate)
        run: python tools/headless_validator.py
        timeout-minutes: 2

      - name: Run cross-module consistency checks
        run: |
          python -c "
          from Programma_CS2_RENAN.core.app_types import PlayerRole as canonical
          print('PlayerRole canonical check: PASS')

          from Programma_CS2_RENAN.backend.processing.feature_engineering import METADATA_DIM
          from Programma_CS2_RENAN.backend.nn.config import INPUT_DIM
          assert METADATA_DIM == INPUT_DIM, f'METADATA_DIM ({METADATA_DIM}) != INPUT_DIM ({INPUT_DIM})'
          print(f'METADATA_DIM consistency check: PASS (dim={METADATA_DIM})')
          "

      - name: Run portability tests
        run: python tools/portability_test.py

      - name: Verify integrity manifest
        run: python Programma_CS2_RENAN/tools/sync_integrity_manifest.py --verify-only

      - name: Upload Build Health Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-health-report
          path: Build_Health_Report.json
          retention-days: 30

  # ═══════════════════════════════════════════════════════════════════════════
  # STAGE 4: SECURITY (Parallel with Stage 2-3)
  # Catches dependency vulnerabilities and code security issues.
  # ═══════════════════════════════════════════════════════════════════════════
  security:
    name: Security Scan
    needs: lint
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install security tools
        run: |
          python -m pip install --upgrade pip
          pip install bandit

      - name: Run Bandit security linter (full report)
        run: >
          bandit -r Programma_CS2_RENAN/
          --severity-level medium
          --confidence-level medium
          -f json
          -o bandit-report.json
          --exclude Programma_CS2_RENAN/tests,external_analysis
          || true

      - name: Fail on HIGH-severity Bandit findings
        run: >
          bandit -r Programma_CS2_RENAN/
          --severity-level high
          --confidence-level high
          --exclude Programma_CS2_RENAN/tests,external_analysis
          -f screen

      - name: Check for hardcoded secrets
        shell: bash
        run: |
          if grep -rn "password\s*=\s*['\"]" Programma_CS2_RENAN/ --include="*.py" \
             | grep -v "# noqa" | grep -v "test" | grep -v "example"; then
            echo "ERROR: Possible hardcoded password found"
            exit 1
          fi

      - name: Upload security report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-report
          path: bandit-report.json
          retention-days: 30

  # ═══════════════════════════════════════════════════════════════════════════
  # STAGE 4b: TYPE CHECK (Parallel — informational, non-blocking)
  # P6-04 Phase A: Run mypy with current settings, report only.
  # ═══════════════════════════════════════════════════════════════════════════
  type-check:
    name: Type Check (informational)
    needs: lint
    runs-on: windows-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt
          pip install mypy

      - name: Run mypy (informational)
        run: mypy Programma_CS2_RENAN/ --ignore-missing-imports
        continue-on-error: true

  # ═══════════════════════════════════════════════════════════════════════════
  # BUILD DISTRIBUTION (only on main, after all gates pass)
  # ═══════════════════════════════════════════════════════════════════════════
  build-distribution:
    name: Build Distribution
    runs-on: windows-latest
    needs: [integration, security]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt
          pip install pyinstaller

      - name: Validate critical data files exist (P10-02)
        run: |
          python -c "
          from pathlib import Path
          critical = [
              'Programma_CS2_RENAN/apps/desktop_app/layout.kv',
              'Programma_CS2_RENAN/PHOTO_GUI',
              'Programma_CS2_RENAN/data/map_config.json',
              'Programma_CS2_RENAN/core/integrity_manifest.json',
              'Programma_CS2_RENAN/backend/knowledge/tactical_knowledge.json',
              'alembic',
          ]
          missing = [f for f in critical if not Path(f).exists()]
          if missing:
              print('CRITICAL: Missing data files for build:')
              for f in missing:
                  print(f'  - {f}')
              exit(1)
          print(f'All {len(critical)} critical data files verified.')
          "

      - name: Build executable
        run: python -m PyInstaller --noconfirm packaging/cs2_analyzer_win.spec --log-level WARN

      - name: Post-build integrity audit
        run: python tools/audit_binaries.py

      - name: Upload distribution artifact
        uses: actions/upload-artifact@v4
        with:
          name: cs2-analyzer-windows
          path: dist/
          retention-days: 30
          if-no-files-found: warn
